\* Negative control (the bug, RUNLOOM_PER_G_TSTATE without the handshake): the
\* per-g tstate migrates hub->hub with NO abandon/adopt, so a page allocated on
\* hub A is later operated on hub B.  NoForeignOwnerWhileAttached (a page owned by
\* A while attached to B) AND NoCrossThreadPageOp (a retire on B of an A-owned
\* page) MUST both be violated -- the mimalloc heap-corruption precondition.
CONSTANTS
    Hubs = {h1, h2}
    Pages = {p1, p2}
    Handshake = FALSE
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT NoCrossThreadPageOp
INVARIANT NoForeignOwnerWhileAttached
