\* Negative control (the regression): Backstop=FALSE leaves the block unbounded,
\* so a poke lost after the drain peeked-empty strands the appended fiber forever
\* -> AllWoken (liveness) violated: the lost-wakeup lasso.
SPECIFICATION Spec
CONSTANTS
    Gs = {g1, g2}
    Backstop = FALSE
INVARIANT TypeOK
INVARIANT ResumeIsTerminal
PROPERTY AllWoken
