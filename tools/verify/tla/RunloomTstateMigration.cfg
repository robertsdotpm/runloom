\* Correct (the fix): the migratable per-g tstate runs the mimalloc segment
\* abandon/adopt handshake at the park/resume boundary -- abandon-on-detach (the
\* g's pages -> the abandoned pool) and adopt-on-attach (abandoned pages -> the
\* attaching thread).  No mimalloc page op ever runs on a non-owner thread, and
\* no page is ever stamped with a hub other than the one currently attached.
CONSTANTS
    Hubs = {h1, h2}
    Pages = {p1, p2}
    Handshake = TRUE
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT NoCrossThreadPageOp
INVARIANT NoForeignOwnerWhileAttached
