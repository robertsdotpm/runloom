\* SAFETY teeth: drive the PURE-DEADLOCK branch.  InitDeadlock pins a fiber parked
\* on a channel/lock/await -- NOT runnable, NO external wake, every hub idle -- the
\* only state shape where ~has_wakeable_work() holds with a live fiber.  CensusTick
\* then accumulates quiet and reaches a GENUINE verdict="deadlock".  This exercises
\* NoFalseDeadlock NON-VACUOUSLY (the verdict does fire, and only ever with
\* ~HasWakeableWork).  DeadlockNeverReached is checked as a VIOLATED property: its
\* violation is the witness that a real deadlock verdict is reachable (grep
\* "Temporal properties were violated").  Run with -deadlock.
CONSTANTS Hubs = {h1, h2}
          BuggyKick = FALSE
          StallKick = 2
          DeadlockThresh = 4
SPECIFICATION SpecDeadlock
INVARIANT TypeOK
INVARIANT NoFalseDeadlock
INVARIANT SubsetOK
PROPERTY DeadlockNeverReached
