\* Correct: while a foreign job is in flight the 2ms backstop re-polls and
\* re-drains wake_list, so even a LOST poke self-heals -> every appended fiber is
\* eventually resumed.  AllWoken holds.
SPECIFICATION Spec
CONSTANTS
    Gs = {g1, g2}
    Backstop = TRUE
INVARIANT TypeOK
INVARIANT ResumeIsTerminal
PROPERTY AllWoken
