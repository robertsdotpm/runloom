\* Correct: kick_all_hubs() fires ALL THREE wake paths (ring + idle_cond + pump),
\* so the stall-kick backstop reaches gHub in whatever wait mode it is in -- the
\* hub re-drains and the stranded-runnable g always eventually runs.  The deadlock
\* census never false-fires (NoFalseDeadlock) and the subset relation holds.
CONSTANTS Hubs = {h1, h2}
          BuggyKick = FALSE
          StallKick = 2
          DeadlockThresh = 4
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT NoFalseDeadlock
INVARIANT SubsetOK
PROPERTY EventuallyRun
