\* Correct: while the kernel still owns an op (runloom_iouring_inflight()>0) the
\* drain runs the GETEVENTS overflow flush FIRST (drain-first, drain.c:155-158)
\* before any block, so even the completion the kernel forced into the overflow
\* backlog -- which never re-signals the eventfd -- is flushed into the visible CQ,
\* consumed, and resumed.  CQCAP=1 makes the second of two concurrent completions
\* overflow, so the flush path is exercised.  AllWoken holds.
SPECIFICATION Spec
CONSTANTS
    Gs = {g1, g2}
    CQCAP = 1
    Heal = TRUE
INVARIANT TypeOK
INVARIANT ResumeIsTerminal
INVARIANT NoStrandedCompletion
PROPERTY AllWoken
