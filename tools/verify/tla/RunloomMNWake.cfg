\* Correct: while a foreign-wakeable fiber is in flight (fp_inflight>0) the idle
\* hub's wait is TIMED (pump_1ms), so on every timeout it re-loops and re-drains
\* its sub_head -- even with BOTH kicks (idle_cond + wake-pump eventfd) lost the
\* appended fiber self-heals within one bounded poll tick -> every appended fiber
\* is eventually resumed.  AllWoken holds.
SPECIFICATION Spec
CONSTANTS
    Gs = {g1, g2}
    BoundedPoll = TRUE
INVARIANT TypeOK
INVARIANT ResumeIsTerminal
PROPERTY AllWoken
