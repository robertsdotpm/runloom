\* Negative control (the regression): BoundedPoll=FALSE leaves an idle hub blocked
\* UNBOUNDED (the M:N analogue of epoll_wait(-1) -- a backend with no usable timed
\* wake, or a change that dropped the ~1ms pump cap).  With BOTH kicks lost after
\* the hub drained sub_head empty, the appended fiber is stranded on sub_head
\* forever while its owner hub sleeps -> AllWoken (liveness) violated: the M:N
\* lost-wakeup lasso (HubStuck).
SPECIFICATION Spec
CONSTANTS
    Gs = {g1, g2}
    BoundedPoll = FALSE
INVARIANT TypeOK
INVARIANT ResumeIsTerminal
PROPERTY AllWoken
