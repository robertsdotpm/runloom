\* Timers ON + logical clock ON (lever 6).  Hubs may wait on timers; the
\* controller advances the logical clock and fires only the EARLIEST pending
\* deadline, and only at a quiescent point -- so timer firing is deterministic
\* and never touches the baton.  All properties hold (incl. DeterministicTick),
\* and AllRun still holds with timer detours.
SPECIFICATION Spec
CONSTANTS
    Hubs = {h1, h2}
    NoHub = NoHub
    Preempt = TRUE
    Barrier = TRUE
    Timers = TRUE
    LogicalClock = TRUE
    MaxClock = 3
    MaxRuns = 2
INVARIANT TypeOK
INVARIANT MutualExclusion
INVARIANT BatonConsistent
INVARIANT DeterministicGrant
INVARIANT DeterministicTick
PROPERTY AllRun
