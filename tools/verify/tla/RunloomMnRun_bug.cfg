\* Negative control (the documented regression): kick_all_hubs() signals idle_cond
\* ONLY (BuggyKick), so a hub stranded in its io_uring RING or netpoll PUMP is never
\* recovered.  SpecLive pins gHub in a ring/pump wait with no external wake source,
\* so the stranded-runnable g is never kicked in its wait mode -> it never runs.
\* EventuallyRun is VIOLATED (a permanent lost wakeup -- the cov_workload --hubs 4
\* loop-backend hang).  NoFalseDeadlock STILL HOLDS: gQueued keeps has_wakeable_work()
\* TRUE so the census stays blind, documenting that only the stall-kick backstop --
\* with an all-mode kick -- catches this class of lost wakeup.
CONSTANTS Hubs = {h1, h2}
          BuggyKick = TRUE
          StallKick = 2
          DeadlockThresh = 4
SPECIFICATION SpecLive
INVARIANT TypeOK
INVARIANT NoFalseDeadlock
PROPERTY EventuallyRun
