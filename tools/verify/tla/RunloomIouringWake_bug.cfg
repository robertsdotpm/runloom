\* Negative control (the regression): Heal=FALSE drops the drain-first overflow
\* flush, so DrainDecide can never pick flush_first.  Once one completion lands in
\* the kernel overflow backlog (CQCAP=1 forces it) with the eventfd un-signalled
\* and the drain blocks, nothing ever makes that completion visible -> the fiber is
\* stranded forever -> AllWoken (liveness) violated: the CQ-overflow lost-wakeup
\* lasso (DrainStuck).  ResumeIsTerminal + NoStrandedCompletion still hold (the
\* completion is stranded, not double-resumed or forgotten by the inflight gate).
SPECIFICATION Spec
CONSTANTS
    Gs = {g1, g2}
    CQCAP = 1
    Heal = FALSE
INVARIANT TypeOK
INVARIANT ResumeIsTerminal
INVARIANT NoStrandedCompletion
PROPERTY AllWoken
