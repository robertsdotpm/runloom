\* Negative control: a hub consumes a global-runq entry (QUEUED->RUNNING) but
\* forgets the runloom_g_decref of the queue ref -> the ref leaks: rc no longer
\* matches the wake_state (Ledger violated) and the g is never freed.
CONSTANTS Buggy = TRUE
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT Ledger
INVARIANT RcNonNeg
INVARIANT FreedConsistent
