# Unit-test matrix across Python versions + OSes on every push.

name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps + pygo
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .

      - name: Run tests
        # tests/ uses unittest discovery; run from repo root so
        # tests.test_chan etc resolve correctly.
        run: python -m unittest discover tests -v

      - name: Print active backend
        run: python -c "import pygo_core; print('coro=', pygo_core.backend(), '  netpoll=', pygo_core.netpoll_backend())"
