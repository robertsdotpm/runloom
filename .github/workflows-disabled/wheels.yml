# Build prebuilt wheels for the supported matrix and (optionally) upload
# to PyPI on a tag.  Two trigger modes:
#   * push to main / PR    -> build the matrix, don't upload (sanity)
#   * push a v* tag        -> build + upload to PyPI
# The pyproject.toml [tool.cibuildwheel] section is the source of truth
# for build/skip selectors; this workflow only wires up the runners.

name: wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:   # allow manual runs from the GitHub UI

jobs:
  build_wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 has manylinux_2_28 in cibuildwheel's prebuilt images.
        # macos-13 is the last x86_64 macOS runner; macos-14 is arm64.
        # We let cibuildwheel build universal2 wheels on macos-14 so we
        # get arm64 + x86_64 from one runner.
        os: [ubuntu-22.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel==2.21.3

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Smoke-test imports on every wheel.  --skip enforced via
          # pyproject.toml so we stay consistent across local + CI runs.
          CIBW_TEST_COMMAND: "python -c \"import runloom, runloom_c; print('OK', runloom_c.backend(), runloom_c.netpoll_backend())\""

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
          if-no-files-found: error

  upload_pypi:
    # Only on tag push.  Wheels + sdist already in artifacts.
    name: upload to PyPI
    needs: [build_wheels, build_sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Trusted publisher (no API token in secrets).  See
    # https://docs.pypi.org/trusted-publishers/ for the PyPI side.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
