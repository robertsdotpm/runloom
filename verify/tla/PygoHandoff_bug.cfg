\* Negative control: EnableRescue = FALSE removes the rescue M.  A hub that
\* wedges with a non-empty queue strands its work forever, so the AllDrained
\* liveness property MUST be violated.  Run with -deadlock so TLC reports the
\* temporal violation (the stuck-but-stuttering behavior) rather than a
\* deadlock at the wedged state.
SPECIFICATION Spec
CONSTANTS
    Hubs = {h1, h2}
    InitWork = 2
    EnableRescue = FALSE
INVARIANT TypeOK
INVARIANT NoConcurrentDrain
PROPERTY AllDrained
