\* Negative control (the STW-monopoly hang): a hub may block while ATTACHED (a C4
\* violation) and never reach a safe point, so stop-the-world wedges in "stopping"
\* forever -> STWCompletes MUST be violated.
CONSTANTS
    Hubs = {h1, h2}
    NoHub = NoHub
    Bypass = FALSE
    BuggyBlock = TRUE
    MaxStops = 1
SPECIFICATION FairSpec
INVARIANT TypeOK
PROPERTY STWCompletes
