\* Negative control: Buggy = TRUE makes park ignore the pending wake (the
\* classic lost wakeup).  Safety still holds, but the AllComplete liveness
\* property MUST be violated -- a goroutine parks forever.  TLC reports a
\* temporal-property violation with a lasso counterexample.
SPECIFICATION Spec
CONSTANTS
    Gs = {g1, g2}
    Hubs = {h1, h2}
    NoHub = NoHub
    Buggy = TRUE
INVARIANT TypeOK
INVARIANT NoDoubleRun
INVARIANT DoneIsTerminal
PROPERTY AllComplete
