\* Negative control: timers ON but LogicalClock OFF.  The controller may fire a
\* later timer while an earlier deadline is still pending (wall-clock ordering)
\* -> DeterministicTick is violated.  This is the timer nondeterminism the
\* logical clock removes -- the analogue of the Barrier=FALSE control for grants.
SPECIFICATION Spec
CONSTANTS
    Hubs = {h1, h2}
    NoHub = NoHub
    Preempt = TRUE
    Barrier = TRUE
    Timers = TRUE
    LogicalClock = FALSE
    MaxClock = 3
    MaxRuns = 2
INVARIANT TypeOK
INVARIANT MutualExclusion
INVARIANT DeterministicTick
PROPERTY AllRun
