\* Negative control (the original bug): hub tstates are deleted from the MAIN
\* thread (mn_fini).  unbind_gilstate clears the main thread's slot and asserts it
\* held the hub tstate -> GilstateContract (the pystate.c:345 assert) AND
\* GilBindingConsistent (the release-build corruption) MUST both be violated.
CONSTANTS
    Hubs = {h1, h2}
    DeleteOnOwner = FALSE
SPECIFICATION Spec
INVARIANT TypeOK
INVARIANT GilstateContract
INVARIANT GilBindingConsistent
