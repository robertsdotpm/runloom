\* Negative control: barrier rendezvous OFF.  The controller can grant the
\* baton while another hub is still arriving -> the choice is over a partial
\* requester set -> DeterministicGrant is violated (residual nondeterminism).
SPECIFICATION Spec
CONSTANTS
    Hubs = {h1, h2}
    NoHub = NoHub
    Preempt = TRUE
    Barrier = FALSE
    MaxRuns = 2
INVARIANT TypeOK
INVARIANT MutualExclusion
INVARIANT DeterministicGrant
PROPERTY AllRun
