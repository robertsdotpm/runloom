\* Negative control: preemption OFF.  A CPU-bound (spun) hub holds the baton
\* forever and starves the others -> AllRun (liveness) is violated.  This is
\* the deadlock the prototype hit; "keep preemption ON" is the fix.
SPECIFICATION Spec
CONSTANTS
    Hubs = {h1, h2}
    NoHub = NoHub
    Preempt = FALSE
    Barrier = TRUE
    MaxRuns = 2
INVARIANT TypeOK
INVARIANT MutualExclusion
PROPERTY AllRun
